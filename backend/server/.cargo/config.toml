[env]
# utoipa-swagger-ui 编译时下载 Swagger UI 资源的代理地址 (国内加速)
SWAGGER_UI_DOWNLOAD_URL = "https://gh-proxy.com/https://github.com/swagger-api/swagger-ui/archive/refs/tags/v5.17.14.zip"

[target.x86_64-pc-windows-msvc]
# rustflags = ["-C", "target-feature=+crt-static", "-C", "link-arg=/DEBUG:NONE","--cfg", "tokio_unstable"]
#  rustflags = [ "--cfg", "tokio_unstable"]
# rustflags = [ "-C", "link-arg=/DEBUG:NONE"]


[target.x86_64-unknown-linux-gnu]
#linker = "clang"
#rustflags = ["-C", "link-arg=-fuse-ld=/usr/local/geteway/mold"]

[source.crates-io]
replace-with = 'rsproxy-sparse'
[source.rsproxy]
registry = "https://rsproxy.cn/crates.io-index"
[source.rsproxy-sparse]
registry = "sparse+https://rsproxy.cn/index/"
[registries.rsproxy]
index = "https://rsproxy.cn/crates.io-index"
[net]
git-fetch-with-cli = true
[registries.crates-io]
protocol = "sparse"